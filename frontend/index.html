<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bajaj Finserv Full Stack Challenge</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    padding:30px;
}

.container{
    width:100%;
    max-width:900px;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    color:#0f172a;
    margin-bottom:8px;
}

.header p{
    color:#64748b;
}

textarea{
    width:100%;
    height:180px;
    padding:15px;
    border:2px solid #cbd5e1;
    border-radius:12px;
    font-size:16px;
    resize:none;
    outline:none;
}

textarea:focus{
    border-color:#2563eb;
}

button{
    width:100%;
    margin-top:15px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
}

.result-box{
    margin-top:25px;
}

.result-box h2{
    margin-bottom:10px;
    color:#0f172a;
}

pre{
    background:#0f172a;
    color:#22c55e;
    padding:20px;
    border-radius:12px;
    overflow-x:auto;
    font-size:14px;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#64748b;
    font-size:14px;
}
</style>
</head>

<body>
<div class="container">

    <div class="header">
        <h1>Bajaj Finserv Full Stack Engineering Challenge</h1>
        <p><b>Manshika</b> | Roll No: 2310990732</p>
    </div>

    <textarea id="data">
A->B,A->C,B->D
    </textarea>

    <button onclick="submitData()">
        Analyze Hierarchy
    </button>

    <div class="result-box">
        <h2>API Response</h2>
        <pre id="output">Response will appear here...</pre>
    </div>

    <div class="footer">
        Developed with love by Manshika :)
    </div>

</div>

<script>
async function submitData(){

    const rawInput=document.getElementById("data").value;

    const arr=rawInput
        .split(",")
        .map(item=>item.trim())
        .filter(item=>item.length>0);

    try{

        const response=await fetch("/bfhl", {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                data:arr
            })
        });

        const result=await response.json();

        document.getElementById("output").textContent=
            JSON.stringify(result,null,4);

    }
    catch(error){

        document.getElementById("output").textContent=
            "Error: Unable to connect to API";

    }

}
</script>

</body>
</html>
